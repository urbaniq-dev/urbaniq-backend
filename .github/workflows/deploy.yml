name: Deploy Backend to AWS EC2

on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout codebase
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Configure AWS CLI Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # 3. Log in to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Set up Docker Buildx (for amd64 caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Build and Push Docker Image to ECR
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: 102885960220.dkr.ecr.ap-south-1.amazonaws.com/urbaniq-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6. SSH to EC2 and Deploy
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Login to ECR on the server
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 102885960220.dkr.ecr.ap-south-1.amazonaws.com
            
            # 2. Pull the latest image
            docker pull 102885960220.dkr.ecr.ap-south-1.amazonaws.com/urbaniq-backend:latest
            
            # 3. Stop and remove the existing container (if running)
            docker stop backend-api || true
            docker rm backend-api || true
            
            # 4. Run the new container in background
            docker run -d -p 5001:5001 --env-file .env --name backend-api 102885960220.dkr.ecr.ap-south-1.amazonaws.com/urbaniq-backend:latest
